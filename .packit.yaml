# See the documentation for more information:
# https://packit.dev/docs/configuration/

specfile_path: cantera.spec

# add or remove files that should be synced
files_to_sync:
    - cantera-ci.spec
    - .packit.yaml

# name in upstream package repository or registry (e.g. in PyPI)
upstream_package_name: cantera
# downstream (Fedora) RPM package name
downstream_package_name: cantera

actions:
    post-upstream-clone: "wget https://src.fedoraproject.org/rpms/cantera/raw/rawhide/f/cantera.spec -O cantera.spec"

copy_upstream_release_description: true

jobs:
  - job: propose_downstream
    trigger: release
    metadata:
      dist_git_branches:
        - fedora-all
  - job: koji_build
    trigger: commit
    metadata:
      dist_git_branches:
        - fedora-all
  - job: bodhi_update
    trigger: commit
    metadata:
      dist_git_branches:
        - fedora-all          
  - job: copr_build
    trigger: pull_request
    metadata:
      targets:
        - fedora-all
